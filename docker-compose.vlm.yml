services:
  vllm-vlm:
    profiles: [ "vlm" ]
    image: ${VLLM_IMAGE:-nvcr.io/nvidia/vllm:26.02-py3}
    entrypoint: [ "vllm", "serve" ]
    command:
      - ${VLM_MODEL:-Qwen/Qwen2.5-VL-7B-Instruct}
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --tensor-parallel-size
      - ${VLM_TENSOR_PARALLEL_SIZE:-1}
      - --max-model-len
      - ${VLM_CONTEXT_LIMIT:-8192}
      - --gpu-memory-utilization
      - ${VLM_GPU_MEMORY_UTILIZATION:-0.25}
    ports:
      - "127.0.0.1:8003:8000"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - ${MODEL_CACHE_DIR:-./model_cache}:/root/.cache/huggingface
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/v1/models >/dev/null || exit 1" ]
      interval: 30s
      timeout: 15s
      retries: 40
      start_period: 900s
    networks:
      - rag_net
    restart: unless-stopped
