services:
  # ── 1. LLM Server (Ollama for ARM64/Blackwell) ────────────────────
  ollama:
    image: ollama/ollama:latest
    gpus: all
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    volumes:
      - ollama_cache:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "ollama", "list" ]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── 2. Qdrant ────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── 3. Embeddings (TEI) ──────────────────────────────────────────
  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:86-1.5
    command: --model-id BAAI/bge-m3 --dtype float16
    gpus: all
    ports:
      - "127.0.0.1:8002:80"
    volumes:
      - hf_cache:/data
    restart: unless-stopped

  # ── 4. PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:15
    env_file: .env.production
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rag_user -d rag_enterprise" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 5. FastAPI Backend ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env.production
    gpus: all
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      tei:
        condition: service_started
      ollama:
        condition: service_healthy
    volumes:
      - app_data:/data
      - app_logs:/app/logs
    restart: unless-stopped

  # ── 6. Frontend (Static via Nginx) ───────────────────────────────
  frontend:
    image: nginx:alpine
    ports:
      - "127.0.0.1:3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  ollama_cache:
  qdrant_data:
  hf_cache:
  pg_data:
  app_data:
  app_logs:
